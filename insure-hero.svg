<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" role="img" aria-label="ภาพประกอบประกันเดินทาง">
  <defs>
    <linearGradient id="ihbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1c24"/><stop offset="1" stop-color="#0f0f12"/>
    </linearGradient>
    <linearGradient id="ihg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f1d57f"/><stop offset="1" stop-color="#e0b23c"/>
    </linearGradient>
  </defs>
  <rect width="480" height="220" rx="16" fill="url(#ihbg)"/>
  <circle cx="408" cy="44" r="74" fill="#e0b23c" opacity="0.08"/>
  <circle cx="74" cy="172" r="50" fill="#e0b23c" opacity="0.06"/>
  <!-- airplane -->
  <g transform="translate(62,50) rotate(20)" fill="#e0b23c">
    <path d="M0 7 L42 2 L52 -1 L46 9 L42 11 L0 15 Z"/>
    <path d="M15 4 L27 -9 L31 -9 L23 6 Z"/>
    <path d="M15 12 L27 24 L31 24 L23 13 Z"/>
  </g>
  <!-- dotted flight route -->
  <path d="M98 80 C172 122 300 38 396 106" fill="none" stroke="#e0b23c" stroke-width="2.5" stroke-dasharray="1.5 9" stroke-linecap="round" opacity="0.55"/>
  <!-- destination map pin -->
  <g transform="translate(396,80)">
    <path d="M0 0 C-14 0 -14 19 0 32 C14 19 14 0 0 0 Z" fill="url(#ihg)"/>
    <circle cy="12" r="5" fill="#0f0f12"/>
  </g>
  <!-- umbrella (protection) -->
  <g transform="translate(236,64)">
    <path d="M-60 28 A60 60 0 0 1 60 28 Z" fill="url(#ihg)"/>
    <path d="M-40 28 A40 30 0 0 1 -1 28" fill="#0f0f12" opacity="0.10"/>
    <path d="M1 28 A40 30 0 0 1 40 28" fill="#0f0f12" opacity="0.10"/>
    <path d="M-60 28 A60 60 0 0 1 60 28" fill="none" stroke="#0f0f12" stroke-width="2" opacity="0.18"/>
    <circle cx="0" cy="-33" r="3" fill="#e0b23c"/>
    <line x1="0" y1="28" x2="0" y2="98" stroke="#e0b23c" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 98 q -10 0 -10 -10" fill="none" stroke="#e0b23c" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- traveler (abstract, no face) -->
  <g transform="translate(228,104)">
    <circle cx="0" cy="0" r="11" fill="#f3ecd9"/>
    <path d="M0 9 C-15 11 -13 50 -13 50 L13 50 C13 50 15 11 0 9 Z" fill="#f3ecd9"/>
    <rect x="-12" y="48" width="9" height="22" rx="3.5" fill="#f3ecd9"/>
    <rect x="3" y="48" width="9" height="22" rx="3.5" fill="#f3ecd9"/>
  </g>
  <!-- suitcase -->
  <g transform="translate(250,138)">
    <rect x="0" y="0" width="34" height="42" rx="6" fill="url(#ihg)"/>
    <rect x="11" y="-8" width="12" height="10" rx="3" fill="none" stroke="#e0b23c" stroke-width="3"/>
    <line x1="0" y1="15" x2="34" y2="15" stroke="#0f0f12" stroke-width="2" opacity="0.22"/>
  </g>
  <!-- ground -->
  <line x1="44" y1="192" x2="436" y2="192" stroke="#e0b23c" stroke-width="2" opacity="0.22" stroke-dasharray="2 9"/>
</svg>
