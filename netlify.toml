# Netlify config — Git-connected deploy for ngernduangold
# Netlify runs `command` on each push, then publishes `publish/`.
# build_site.py uses only the Python stdlib (no pip install needed).
[build]
  command = "python3 build_site.py && python3 tools/postdeploy_smoke.py --src site"
  publish = "site"
  # Skip rebuilds when a commit only touches non-site folders (automation/scraping/video pipeline).
  # Exit 0 => Netlify ignores the build. Any change to build_site.py, *.html, media/, tools/, assets,
  # or this file still rebuilds (those live outside the excluded dirs). Saves build minutes.
  ignore = "git diff --quiet HEAD^ HEAD -- . ':(exclude)automation-log' ':(exclude)pipeline' ':(exclude)tiktok-pipeline'"

[build.environment]
  SITE_BASE = "https://ngernduangold.com"
  SITE_GA = "G-17PPE0M1B8"
  PYTHON_VERSION = "3.11"

# Force a single canonical host (apex). The default *.netlify.app domain and the
# www subdomain 301 to https://ngernduangold.com so SEO consolidates on the
# primary domain. (Equivalent to setting the Netlify "primary domain".)
[[redirects]]
  from = "https://ngernduangold.netlify.app/*"
  to = "https://ngernduangold.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.ngernduangold.com/*"
  to = "https://ngernduangold.com/:splat"
  status = 301
  force = true
